name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos Environment
        run: |
          git clone --recursive https://github.com /Users/runner/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV

      - name: Build Tweak Package
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1

      - name: Pack to IPA format
        run: |
          mkdir -p Payload
          mv *.app Payload/ 2>/dev/nullв ҹв ҹв әв өв әв әв һв һв өв өв ҹв ҹв өв әв әв өв ҹв ҹв ҹв һв өв әв ҹв ҹв ҹв өв һв һв ҹв ҹв һв ҹв өв һв ҹв ҹв һв әв әв ҹв өв ҹmkdir -p Payload/ffmenu.app
          zip -r FreeFire_ESP.ipa Payload

      - name: Upload IPA Product
        uses: actions/upload-artifact@v4
        with:
          name: FreeFire_ESP_App
          path: FreeFire_ESP.ipa
